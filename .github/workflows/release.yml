name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true

  build:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: llmention-linux-x86_64.tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            archive: llmention-macos-x86_64.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            archive: llmention-macos-aarch64.tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: llmention-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin llmention

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.archive }} llmention
          cd -

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/llmention.exe `
            -DestinationPath ${{ matrix.archive }}

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}

  checksums:
    name: Generate Checksums
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release archives
        uses: robinraju/release-downloader@v1
        with:
          latest: false
          tag: ${{ github.ref_name }}
          out-file-path: "dist"
          fileName: "llmention-*"

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum llmention-* > checksums.txt
          cat checksums.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: dist/checksums.txt
